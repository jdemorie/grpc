services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: grpc-server
    environment:
      GRPC_PORT: "8080"
    ports:
      # gRPC natif (HTTP/2)
      - "8080:8080"

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    container_name: grpc-envoy
    depends_on:
      - server
    ports:
      # Endpoint gRPC-web (HTTP/1.1 ou HTTP/2) pour le navigateur
      - "8081:8081"
    volumes:
      - ./proxy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: [ "-c", "/etc/envoy/envoy.yaml", "--log-level", "info" ]
